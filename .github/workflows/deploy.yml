name: Deploy Business Documents

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4.2.2

      - name: Login to Docker Hub
        run: docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Backend Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/business-documents:backend ./backend2

      - name: Build Frontend Image
        run: docker build --no-cache -t ${{ secrets.DOCKER_USERNAME }}/business-documents:frontend ./Frontend2

      - name: Build Admin Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/business-documents:admin ./admin-ui

      - name: Push Backend Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/business-documents:backend

      - name: Push Frontend Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/business-documents:frontend

      - name: Push Admin Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/business-documents:admin

  deploy:
    needs: build
    runs-on: self-hosted
    steps:
      - name: Install Docker Compose plugin if missing
        run: |
          if ! docker compose version >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y docker-compose-plugin
          fi

      - name: Ensure app directory exists
        run: mkdir -p /home/ubuntu/app

      - name: Free Docker Space
        run: |
          docker compose -f /home/ubuntu/app/docker-compose.yml down || true
          docker system prune -af || true
          docker builder prune -af || true

      - name: Pull Images from Docker Hub
        run: |
          docker pull ${{ secrets.DOCKER_USERNAME }}/business-documents:backend
          docker pull ${{ secrets.DOCKER_USERNAME }}/business-documents:frontend
          docker pull ${{ secrets.DOCKER_USERNAME }}/business-documents:admin

      - name: Create .env file
        run: |
          cat > /home/ubuntu/app/.env << EOF
          PORT=4001
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}
          STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}
          FRONTEND_URL=${{ secrets.FRONTEND_URL }}
          SMTP_HOST=${{ secrets.SMTP_HOST }}
          SMTP_PORT=${{ secrets.SMTP_PORT }}
          SMTP_USER=${{ secrets.SMTP_USER }}
          SMTP_PASS=${{ secrets.SMTP_PASS }}
          SMTP_FROM=${{ secrets.SMTP_FROM }}
          EOF

      - name: Create docker-compose on EC2
        run: |
          cat > /home/ubuntu/app/docker-compose.yml << 'EOF'
          version: '3.8'

          services:
            backend:
              image: ghassenhar/business-documents:backend
              container_name: backend-container
              ports:
                - "4001:4001"
              env_file:
                - .env
              restart: always

            frontend:
              image: ghassenhar/business-documents:frontend
              container_name: frontend-container
              ports:
                - "3001:3001"
              restart: always

            admin:
              image: ghassenhar/business-documents:admin
              container_name: admin-container
              ports:
                - "4002:4002"
              env_file:
                - .env
              restart: always
          EOF

      - name: Start Containers
        run: docker compose -f /home/ubuntu/app/docker-compose.yml up -d
